<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A0522D"/>
            <stop offset="100%" stop-color="#6B3410"/>
        </linearGradient>
        <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="20" cy="20" r="1.5" fill="#F5B041" opacity="0.25"/>
        </pattern>
    </defs>
    <!-- Background gradient -->
    <rect width="800" height="500" fill="url(#bg)"/>
    <!-- Subtle dot pattern overlay -->
    <rect width="800" height="500" fill="url(#dots)"/>
    <!-- Decorative corner frame -->
    <rect x="40" y="40" width="720" height="420" fill="none" stroke="#F5B041" stroke-width="1.5" opacity="0.5"/>
    <rect x="55" y="55" width="690" height="390" fill="none" stroke="#F5B041" stroke-width="0.8" opacity="0.3"/>
    
    
            <!-- Bowl with steam -->
            <g transform="translate(400, 210)" opacity="0.18">
                <path d="M -80 0 Q -80 50 -50 60 L 50 60 Q 80 50 80 0 Z" fill="white"/>
                <ellipse cx="0" cy="0" rx="80" ry="15" fill="none" stroke="white" stroke-width="3"/>
                <path d="M -30 -40 Q -25 -60 -30 -80" stroke="white" stroke-width="3" fill="none"/>
                <path d="M 0 -40 Q 5 -60 0 -80" stroke="white" stroke-width="3" fill="none"/>
                <path d="M 30 -40 Q 35 -60 30 -80" stroke="white" stroke-width="3" fill="none"/>
            </g>
        
    
    <!-- Cuisine label at top -->
    <text x="400" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#F5B041" letter-spacing="6" font-weight="500">
        INDIAN CUISINE
    </text>
    <!-- Decorative line -->
    <line x1="350" y1="140" x2="450" y2="140" stroke="#F5B041" stroke-width="1"/>
    
    <!-- Restaurant name -->
    <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="white" font-style="italic" font-weight="400">
        Spice Route
    </text>
    <!-- Small ornament below name -->
    <text x="400" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#F5B041" letter-spacing="3">
        ◆◆◆
    </text>
</svg>
