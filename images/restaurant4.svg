<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7D2C2C"/>
            <stop offset="100%" stop-color="#4A1A1A"/>
        </linearGradient>
        <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="20" cy="20" r="1.5" fill="#E8B86B" opacity="0.25"/>
        </pattern>
    </defs>
    <!-- Background gradient -->
    <rect width="800" height="500" fill="url(#bg)"/>
    <!-- Subtle dot pattern overlay -->
    <rect width="800" height="500" fill="url(#dots)"/>
    <!-- Decorative corner frame -->
    <rect x="40" y="40" width="720" height="420" fill="none" stroke="#E8B86B" stroke-width="1.5" opacity="0.5"/>
    <rect x="55" y="55" width="690" height="390" fill="none" stroke="#E8B86B" stroke-width="0.8" opacity="0.3"/>
    
    
            <!-- Plate with pasta swirls -->
            <g transform="translate(400, 200)" opacity="0.18">
                <ellipse cx="0" cy="0" rx="100" ry="20" fill="none" stroke="white" stroke-width="3"/>
                <ellipse cx="0" cy="-5" rx="85" ry="15" fill="white" opacity="0.5"/>
                <path d="M -50 -10 Q -30 -25 -10 -10 Q 10 -25 30 -10 Q 50 -25 70 -10" stroke="white" stroke-width="3" fill="none"/>
                <path d="M -60 0 Q -40 -15 -20 0 Q 0 -15 20 0 Q 40 -15 60 0" stroke="white" stroke-width="3" fill="none"/>
            </g>
        
    
    <!-- Cuisine label at top -->
    <text x="400" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#E8B86B" letter-spacing="6" font-weight="500">
        ITALIAN CUISINE
    </text>
    <!-- Decorative line -->
    <line x1="350" y1="140" x2="450" y2="140" stroke="#E8B86B" stroke-width="1"/>
    
    <!-- Restaurant name -->
    <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="white" font-style="italic" font-weight="400">
        La Bella Trattoria
    </text>
    <!-- Small ornament below name -->
    <text x="400" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#E8B86B" letter-spacing="3">
        ◆◆◆
    </text>
</svg>
