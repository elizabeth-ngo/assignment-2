<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6B2737"/>
            <stop offset="100%" stop-color="#4A1A26"/>
        </linearGradient>
        <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="20" cy="20" r="1.5" fill="#C9A66B" opacity="0.25"/>
        </pattern>
    </defs>
    <!-- Background gradient -->
    <rect width="800" height="500" fill="url(#bg)"/>
    <!-- Subtle dot pattern overlay -->
    <rect width="800" height="500" fill="url(#dots)"/>
    <!-- Decorative corner frame -->
    <rect x="40" y="40" width="720" height="420" fill="none" stroke="#C9A66B" stroke-width="1.5" opacity="0.5"/>
    <rect x="55" y="55" width="690" height="390" fill="none" stroke="#C9A66B" stroke-width="0.8" opacity="0.3"/>
    
    
            <!-- Wine glass illustration -->
            <g transform="translate(400, 200)" opacity="0.18">
                <path d="M -50 -80 L 50 -80 L 40 -10 Q 0 30 -40 -10 Z" fill="white"/>
                <line x1="0" y1="-10" x2="0" y2="60" stroke="white" stroke-width="4"/>
                <ellipse cx="0" cy="65" rx="35" ry="6" fill="white"/>
            </g>
        
    
    <!-- Cuisine label at top -->
    <text x="400" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#C9A66B" letter-spacing="6" font-weight="500">
        FRENCH CUISINE
    </text>
    <!-- Decorative line -->
    <line x1="350" y1="140" x2="450" y2="140" stroke="#C9A66B" stroke-width="1"/>
    
    <!-- Restaurant name -->
    <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="white" font-style="italic" font-weight="400">
        The Velvet Bistro
    </text>
    <!-- Small ornament below name -->
    <text x="400" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#C9A66B" letter-spacing="3">
        ◆◆◆
    </text>
</svg>
