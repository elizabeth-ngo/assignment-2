<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="herobg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#6B2737"/>
            <stop offset="60%" stop-color="#4A1A26"/>
            <stop offset="100%" stop-color="#2A1F1A"/>
        </linearGradient>
        <radialGradient id="warmlight" cx="50%" cy="30%" r="40%">
            <stop offset="0%" stop-color="#C9A66B" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#C9A66B" stop-opacity="0"/>
        </radialGradient>
    </defs>
    
    <!-- Dark warm gradient background -->
    <rect width="800" height="1000" fill="url(#herobg)"/>
    
    <!-- Warm light source -->
    <rect width="800" height="1000" fill="url(#warmlight)"/>
    
    <!-- Decorative hanging lights -->
    <g opacity="0.6">
        <line x1="200" y1="0" x2="200" y2="180" stroke="#C9A66B" stroke-width="1"/>
        <circle cx="200" cy="180" r="22" fill="#C9A66B"/>
        <circle cx="200" cy="180" r="35" fill="#C9A66B" opacity="0.25"/>
        
        <line x1="400" y1="0" x2="400" y2="120" stroke="#C9A66B" stroke-width="1"/>
        <circle cx="400" cy="120" r="26" fill="#C9A66B"/>
        <circle cx="400" cy="120" r="40" fill="#C9A66B" opacity="0.25"/>
        
        <line x1="620" y1="0" x2="620" y2="200" stroke="#C9A66B" stroke-width="1"/>
        <circle cx="620" cy="200" r="22" fill="#C9A66B"/>
        <circle cx="620" cy="200" r="35" fill="#C9A66B" opacity="0.25"/>
    </g>
    
    <!-- Wine glass illustration -->
    <g transform="translate(400, 560)" opacity="0.85">
        <!-- Wine in glass -->
        <path d="M -75 -50 L 75 -50 L 60 50 Q 0 100 -60 50 Z" fill="#6B2737" stroke="#C9A66B" stroke-width="1.5"/>
        <!-- Wine surface -->
        <ellipse cx="0" cy="-50" rx="75" ry="10" fill="#4A1A26" stroke="#C9A66B" stroke-width="1.5"/>
        <ellipse cx="0" cy="-50" rx="60" ry="6" fill="#8B3A4A"/>
        <!-- Highlight on glass -->
        <ellipse cx="-25" cy="0" rx="6" ry="40" fill="white" opacity="0.15"/>
        <!-- Stem -->
        <rect x="-3" y="50" width="6" height="120" fill="#C9A66B" opacity="0.8"/>
        <!-- Base -->
        <ellipse cx="0" cy="180" rx="55" ry="10" fill="#C9A66B" opacity="0.8"/>
    </g>
    
    <!-- Stars / ambient particles -->
    <circle cx="120" cy="450" r="2" fill="#C9A66B" opacity="0.7"/>
    <circle cx="700" cy="500" r="1.5" fill="#C9A66B" opacity="0.6"/>
    <circle cx="650" cy="400" r="1" fill="#C9A66B" opacity="0.5"/>
    <circle cx="150" cy="600" r="1.5" fill="#C9A66B" opacity="0.6"/>
    <circle cx="700" cy="700" r="2" fill="#C9A66B" opacity="0.7"/>
    <circle cx="100" cy="800" r="1" fill="#C9A66B" opacity="0.5"/>
    
    <!-- Bottom decorative ornament -->
    <text x="400" y="900" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#C9A66B" letter-spacing="8" opacity="0.9">
        ◆ SAVOUR ◆
    </text>
    <text x="400" y="930" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C9A66B" letter-spacing="6" opacity="0.7">
        ESTD · 2026
    </text>
</svg>
