<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8B4513"/>
            <stop offset="100%" stop-color="#5C2A0A"/>
        </linearGradient>
        <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="20" cy="20" r="1.5" fill="#E5C158" opacity="0.25"/>
        </pattern>
    </defs>
    <!-- Background gradient -->
    <rect width="800" height="500" fill="url(#bg)"/>
    <!-- Subtle dot pattern overlay -->
    <rect width="800" height="500" fill="url(#dots)"/>
    <!-- Decorative corner frame -->
    <rect x="40" y="40" width="720" height="420" fill="none" stroke="#E5C158" stroke-width="1.5" opacity="0.5"/>
    <rect x="55" y="55" width="690" height="390" fill="none" stroke="#E5C158" stroke-width="0.8" opacity="0.3"/>
    
    
            <!-- Grill / fire -->
            <g transform="translate(400, 210)" opacity="0.18">
                <path d="M -60 30 Q -40 -30 0 0 Q 30 -50 30 10 Q 50 -20 60 30 Z" fill="white"/>
                <line x1="-80" y1="40" x2="80" y2="40" stroke="white" stroke-width="4"/>
                <line x1="-70" y1="50" x2="70" y2="50" stroke="white" stroke-width="3"/>
                <line x1="-60" y1="60" x2="60" y2="60" stroke="white" stroke-width="3"/>
            </g>
        
    
    <!-- Cuisine label at top -->
    <text x="400" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#E5C158" letter-spacing="6" font-weight="500">
        MIDDLE EASTERN CUISINE
    </text>
    <!-- Decorative line -->
    <line x1="350" y1="140" x2="450" y2="140" stroke="#E5C158" stroke-width="1"/>
    
    <!-- Restaurant name -->
    <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="white" font-style="italic" font-weight="400">
        Bahar Grill
    </text>
    <!-- Small ornament below name -->
    <text x="400" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#E5C158" letter-spacing="3">
        ◆◆◆
    </text>
</svg>
