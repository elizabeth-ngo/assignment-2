<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3A5F4A"/>
            <stop offset="100%" stop-color="#1F3A2D"/>
        </linearGradient>
        <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="20" cy="20" r="1.5" fill="#C2B280" opacity="0.25"/>
        </pattern>
    </defs>
    <!-- Background gradient -->
    <rect width="800" height="500" fill="url(#bg)"/>
    <!-- Subtle dot pattern overlay -->
    <rect width="800" height="500" fill="url(#dots)"/>
    <!-- Decorative corner frame -->
    <rect x="40" y="40" width="720" height="420" fill="none" stroke="#C2B280" stroke-width="1.5" opacity="0.5"/>
    <rect x="55" y="55" width="690" height="390" fill="none" stroke="#C2B280" stroke-width="0.8" opacity="0.3"/>
    
    
            <!-- Olive branch -->
            <g transform="translate(400, 200)" opacity="0.18">
                <line x1="-100" y1="0" x2="100" y2="0" stroke="white" stroke-width="3"/>
                <ellipse cx="-70" cy="-15" rx="18" ry="9" fill="white" transform="rotate(-30 -70 -15)"/>
                <ellipse cx="-30" cy="-18" rx="18" ry="9" fill="white" transform="rotate(-30 -30 -18)"/>
                <ellipse cx="20" cy="-20" rx="18" ry="9" fill="white" transform="rotate(-30 20 -20)"/>
                <ellipse cx="60" cy="-15" rx="18" ry="9" fill="white" transform="rotate(-30 60 -15)"/>
                <ellipse cx="-50" cy="15" rx="18" ry="9" fill="white" transform="rotate(30 -50 15)"/>
                <ellipse cx="0" cy="18" rx="18" ry="9" fill="white" transform="rotate(30 0 18)"/>
                <ellipse cx="45" cy="15" rx="18" ry="9" fill="white" transform="rotate(30 45 15)"/>
            </g>
        
    
    <!-- Cuisine label at top -->
    <text x="400" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#C2B280" letter-spacing="6" font-weight="500">
        MEDITERRANEAN CUISINE
    </text>
    <!-- Decorative line -->
    <line x1="350" y1="140" x2="450" y2="140" stroke="#C2B280" stroke-width="1"/>
    
    <!-- Restaurant name -->
    <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="white" font-style="italic" font-weight="400">
        Olive &amp; Vine
    </text>
    <!-- Small ornament below name -->
    <text x="400" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#C2B280" letter-spacing="3">
        ◆◆◆
    </text>
</svg>
